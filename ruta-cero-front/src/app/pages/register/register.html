<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Crear cuenta</h1>
      <p>Únete a Ruta 0 y descubre Quito</p>
    </div>

    <form (ngSubmit)="registrarse()" class="auth-form">
      <div class="campo">
        <label for="nombre">Nombre</label>
        <input
          id="nombre"
          type="text"
          [(ngModel)]="nombre"
          name="nombre"
          placeholder="Tu nombre"
          required
        />
      </div>

      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Mínimo 6 caracteres"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="campo">
        <label for="confirmar">Confirmar contraseña</label>
        <input
          id="confirmar"
          type="password"
          [(ngModel)]="confirmar"
          name="confirmar"
          placeholder="Repite la contraseña"
          required
          autocomplete="new-password"
        />
      </div>

      <p class="error-msg" *ngIf="error">{{ error }}</p>

      <button type="submit" class="btn-principal" [disabled]="cargando">
        {{ cargando ? 'Creando cuenta...' : 'Crear cuenta' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>
