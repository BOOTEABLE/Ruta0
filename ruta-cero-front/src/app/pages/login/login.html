<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Ruta 0</h1>
      <p>Tu asistente turístico en Quito</p>
    </div>

    <form (ngSubmit)="ingresar()" class="auth-form">
      <div class="campo">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <p class="error-msg" *ngIf="error">{{ error }}</p>

      <button type="submit" class="btn-principal" [disabled]="cargando">
        {{ cargando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate aquí</a>
    </p>
  </div>
</div>
